openapi: 3.0.3
info:
  title: User Service API
  version: 0.1.0
servers:
  - url: http://localhost:3002
security:
  - bearerAuth: []
paths:
  /health/live:
    get:
      security: []
      responses:
        "200":
          description: Service is alive.
  /health/ready:
    get:
      security: []
      responses:
        "200":
          description: Service dependencies are ready.
        "503":
          description: Service is not ready.
  /users:
    post:
      summary: Create a user profile.
      responses:
        "201":
          description: User profile created.
        "400":
          description: Invalid payload.
        "409":
          description: User could not be created.
  /users/me:
    get:
      summary: Get authenticated user's profile.
      responses:
        "200":
          description: Profile response.
        "404":
          description: User not found.
  /users/{id}:
    get:
      summary: Get user profile by ID.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Profile response.
        "404":
          description: User not found.
    patch:
      summary: Update user profile or status.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdate"
      responses:
        "200":
          description: Updated profile response.
        "400":
          description: Invalid payload.
        "404":
          description: User not found.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    UserProfileUpdate:
      type: object
      properties:
        phone_e164:
          type: string
        email:
          type: string
          format: email
        phone_verified:
          type: boolean
        email_verified:
          type: boolean
        status:
          type: string
          enum: [pending, active, suspended, closed]
        first_name:
          type: string
        middle_name:
          type: string
        last_name:
          type: string
        date_of_birth:
          type: string
          format: date
        address_line1:
          type: string
        address_line2:
          type: string
        city:
          type: string
        state_region:
          type: string
        country_code:
          type: string
          minLength: 2
          maxLength: 2

