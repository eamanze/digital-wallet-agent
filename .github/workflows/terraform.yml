name: Terraform Plan and Apply
on:
  pull_request:
    paths: ['infrastructure/terraform/**']
  workflow_dispatch:
    inputs:
      environment: { required: true, type: choice, options: [dev, staging, prod] }
      apply: { required: true, type: boolean, default: false }
permissions: { contents: read, id-token: write }
jobs:
  plan:
    runs-on: ubuntu-latest
    strategy: { matrix: { environment: [dev, staging, prod] } }
    environment: ${{ matrix.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform -chdir=infrastructure/terraform/environments/${{ matrix.environment }} init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" -backend-config="key=wallet/${{ matrix.environment }}.tfstate" -backend-config="region=${{ vars.AWS_REGION }}"
      - run: terraform -chdir=infrastructure/terraform/environments/${{ matrix.environment }} fmt -check
      - run: terraform -chdir=infrastructure/terraform/environments/${{ matrix.environment }} validate
      - run: terraform -chdir=infrastructure/terraform/environments/${{ matrix.environment }} plan -input=false -out=tfplan
  apply:
    if: github.event_name == 'workflow_dispatch' && inputs.apply == true
    needs: plan
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform -chdir=infrastructure/terraform/environments/${{ inputs.environment }} init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" -backend-config="key=wallet/${{ inputs.environment }}.tfstate" -backend-config="region=${{ vars.AWS_REGION }}"
      - run: terraform -chdir=infrastructure/terraform/environments/${{ inputs.environment }} apply -auto-approve -input=false
